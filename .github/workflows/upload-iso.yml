name: Upload ISO to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'isos/*.iso'
      - '.github/workflows/upload-iso.yml'

jobs:
  upload-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload newest ISO
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          ISO_DIR="isos"
          BUCKET="deanos-releases"
          ISO_PATTERN='^deanos-([0-9]{2})-([0-9]{2})-([0-9]{4})-([0-9]+)_([0-9]+)\.iso$'

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY" >&2
            exit 1
          fi

          if [ ! -d "$ISO_DIR" ]; then
            echo "Missing folder: $ISO_DIR" >&2
            exit 1
          fi

          newest_key=""
          newest_file=""

          for filepath in "$ISO_DIR"/*.iso; do
            [ -e "$filepath" ] || continue
            filename="$(basename "$filepath")"

            if [[ "$filename" =~ $ISO_PATTERN ]]; then
              dd="${BASH_REMATCH[1]}"
              mm="${BASH_REMATCH[2]}"
              yyyy="${BASH_REMATCH[3]}"
              major="${BASH_REMATCH[4]}"
              minor="${BASH_REMATCH[5]}"

              # Compare by semantic version first, then by date.
              key="$(printf '%010d%010d%04d%02d%02d' "$major" "$minor" "$yyyy" "$mm" "$dd")"
              if [ -z "$newest_key" ] || [ "$key" \> "$newest_key" ]; then
                newest_key="$key"
                newest_file="$filepath"
              fi
            fi
          done

          if [ -z "$newest_file" ]; then
            echo "No ISO files found matching deanos-DD-MM-YYYY-X_Y_Z.iso" >&2
            exit 1
          fi

          newest_name="$(basename "$newest_file")"
          storage_path="iso/$newest_name"
          upload_url="${SUPABASE_URL%/}/storage/v1/object/$BUCKET/$storage_path"

          echo "Uploading $newest_name"

          curl --fail-with-body --silent --show-error \
            -X POST "$upload_url" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "x-upsert: true" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$newest_file"

          echo "Uploaded $newest_name to $BUCKET"
