name: Upload ISO to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'isos/*.iso'
      - '.github/workflows/upload-iso.yml'

jobs:
  upload-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create package.json
        run: |
          cat > package.json <<'EOF'
          {
            "type": "module",
            "dependencies": {
              "@supabase/supabase-js": "^2.49.1"
            }
          }
          EOF

      - name: Install dependencies
        run: npm install

      - name: Upload newest ISO
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > upload-latest-iso.mjs <<'EOF'
          import fs from "node:fs";
          import path from "node:path";
          import { createClient } from "@supabase/supabase-js";

          const ISO_DIR = "isos";
          const BUCKET = "deanos-releases";

          // deanos-DD-MM-YYYY-X_Y_Z.iso
          const ISO_REGEX = /^deanos-(\d{2})-(\d{2})-(\d{4})-(\d+)_(\d+)_(\d+)\.iso$/;

          function compareVersion(a, b) {
            for (let i = 0; i < 3; i++) {
              if (a[i] !== b[i]) return a[i] - b[i];
            }
            return 0;
          }

          function getIsoFiles() {
            if (!fs.existsSync(ISO_DIR)) {
              throw new Error(`Missing folder: ${ISO_DIR}`);
            }

            return fs.readdirSync(ISO_DIR)
              .filter(file => ISO_REGEX.test(file))
              .map(file => {
                const match = file.match(ISO_REGEX);
                const [, dd, mm, yyyy, major, minor, patch] = match;

                return {
                  file,
                  fullPath: path.join(ISO_DIR, file),
                  dateValue: Number(`${yyyy}${mm}${dd}`),
                  version: [Number(major), Number(minor), Number(patch)],
                };
              });
          }

          function pickNewest(files) {
            if (files.length === 0) {
              throw new Error("No ISO files found matching deanos-DD-MM-YYYY-X_Y_Z.iso");
            }

            files.sort((a, b) => {
              const versionCmp = compareVersion(a.version, b.version);
              if (versionCmp !== 0) return versionCmp;
              return a.dateValue - b.dateValue;
            });

            return files[files.length - 1];
          }

          async function main() {
            const url = process.env.SUPABASE_URL;
            const key = process.env.SUPABASE_SERVICE_ROLE_KEY;

            if (!url || !key) {
              throw new Error("Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY");
            }

            const supabase = createClient(url, key);

            const files = getIsoFiles();
            const latest = pickNewest(files);

            console.log(`Uploading ${latest.file}`);

            const fileBuffer = fs.readFileSync(latest.fullPath);

            const storagePath = `iso/${latest.file}`;

            const { error } = await supabase.storage
              .from(BUCKET)
              .upload(storagePath, fileBuffer, {
              contentType: "application/octet-stream",
              upsert: true,
            });

            if (error) {
              throw error;
            }

            console.log(`Uploaded ${latest.file} to ${BUCKET}`);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node upload-latest-iso.mjs
